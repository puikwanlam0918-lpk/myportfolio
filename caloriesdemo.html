            background: #334155; border-radius: 46px 46px 0 0; z-index: 10; 
        }

        .char-eye.right { right: 20px; }

        @keyframes chew { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.3); } }

        .char-body { position: absolute; bottom: 0; left: 20px; width: 100px; height: 50px; background: #3b82f6; border-radius: 30px 30px 0 0; z-index: 1; }

        .drag-food-item:active { cursor: grabbing; transform: scale(0.95); }

        button.action-btn {

            background-color: #ef4444; color: white; width: auto; font-size: 13px; padding: 6px 12px;

        .feedback { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; line-height: 1.6; }

        .error { background-color: #fee2e2; color: #991b1b; border: 2px solid #ef4444; }

            background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; padding: 10px;

        .nutrient-display-box {

        .nutrient-desc { font-size: 14px; color: #334155; line-height: 1.6; background: white; padding: 10px; border-radius: 6px; border: 1px dashed #cbd5e1; }

</head>

    <div class="timeline">

let currentStageIndex = 0;
let currentSelected = [];
let chosenFoodsHistory = [];

let runningCalories = 0; 
let caloriesHistory = { breakfast: 0, lunch: 0, activity: 0, teatime: 0, dinner: 0 };
let stepControl = 1; 

let fedItemsCount = 0;
let feedingEquationText = "";
const tooltipDom = document.getElementById('lunch-tooltip');

window.onload = function() {
    loadStage();
};

function updateCaloriesDisplay() {
    document.getElementById('current-calories-display').innerText = `📈 目前體內累積熱量：${runningCalories} kcal`;
}

function loadStage() {
    currentSelected = [];
    document.getElementById('math-zone').style.display = 'none';
    document.getElementById('feeding-zone').style.display = 'none';
    document.getElementById('feedback-box').style.display = 'none';
    document.getElementById('next-stage-btn').style.display = 'none';
    document.getElementById('verify-btn').style.display = 'block';
    
    if(stages[currentStageIndex].name === 'lunch' || stages[currentStageIndex].name === 'dinner') {
        stepControl = 1; 
    }

    for(let i=0; i<=5; i++) {
        const node = document.getElementById(`node-${i}`);
        if(i === currentStageIndex) node.classList.add('active');
        else node.classList.remove('active');
    }

    const stage = stages[currentStageIndex];
    document.getElementById('story-display').innerHTML = stage.story;
    
    if (stage.name === "teatime") {
        let teatimeChoiceHtml = `
            <div class="teatime-choice-box">
                <button class="choice-btn yes" onclick="chooseTeatime(true)">🙋‍♂️ 想吃，選個點心</button>
                <button class="choice-btn no" onclick="chooseTeatime(false)">🙅‍♂️ 不吃，跳過下午茶</button>
            </div>
            <div id="teatime-options-area" style="display:none;"></div>
        `;
        document.getElementById('game-play-zone').innerHTML = teatimeChoiceHtml;
        return;
    }

    if (stage.type === "lunch-special") {
        startLunchSpecialMode();
    } else {
        renderOptionsGrid();
    }
}

function renderOptionsGrid() {
    const stage = stages[currentStageIndex];
    let requiredCount = stage.name === 'breakfast' || stage.name === 'dinner' ? 3 : 1;
    let html = "";
    
    html += `<div class="section-title">${stage.type === 'food' ? `🍽️ 請選擇 ${requiredCount} 種食物：` : '🏃‍♂️ 請選擇 1 個活動項目：'}</div>`;
    html += `<div class="grid" id="options-grid-box">`;
    
    stage.options.forEach((opt, idx) => {
        let displayCalText = "";
        let displayWeight = "";
        
        if (stage.name === "activity") {
            displayCalText = `消耗 ${opt.baseCalories} kcal`;
            displayWeight = `時間單位: 每30分鐘`;
        } else {
            displayCalText = `${opt.calories} kcal`;
            displayWeight = `份量: ${opt.weight}`;
        }

        html += `
            <div class="card" id="item-${idx}" onclick="selectItem(${idx})">
                <div>
                    <div class="emoji">${opt.emoji}</div>
                    <div class="name">${opt.name}</div>
                    <div class="weight">${displayWeight}</div>
                </div>
                <div>
                    <div class="info">${displayCalText}</div>
                </div>
            </div>`;
    });
    html += `</div>`;

    if (stage.name === "activity") {
        html += `
            <div id="dynamic-time-select-zone" class="time-select-container" style="display:none; margin-top:15px;">
                ⏱️ <b>很好！請選擇持續時間：</b><br><br>
                <select id="activity-duration-select" onchange="updateActivityTimeMultiplier(this.value)">
                    <option value="1">30分鐘</option>
                    <option value="2">1小時 (30分鐘 × 2)</option>
                    <option value="3">1小時30分鐘 (30分鐘 × 3)</option>
                    <option value="4">2小時 (30分鐘 × 4)</option>
                </select>
            </div>
        `;
    }

    let actionBtnText = (stage.name === "activity") ? "準備好了，開始活動吧！" : "選好了，快來吃吧！";
    html += `<button class="action-btn" id="lock-selection-btn" onclick="lockSelection()">${actionBtnText}</button>`;
    
    let targetArea = document.getElementById('teatime-options-area');
    if (stage.name === "teatime" && targetArea) {
        targetArea.innerHTML = html;
        targetArea.style.display = 'block';
    } else {
        document.getElementById('game-play-zone').innerHTML = html;
    }
    updateCaloriesDisplay();
}

function updateActivityTimeMultiplier(val) {
    const stage = stages[currentStageIndex];
    stage.selectedMultiplier = parseInt(val);
    
    if (val === "1") stage.selectedDurationText = "30分鐘";
    else if (val === "2") stage.selectedDurationText = "1小時";
    else if (val === "3") stage.selectedDurationText = "1小時30分鐘";
    else if (val === "4") stage.selectedDurationText = "2小時";
}

function startLunchSpecialMode() {
    const stage = stages[currentStageIndex];
    document.getElementById('game-play-zone').innerHTML = ""; 
    const feedingZone = document.getElementById('feeding-zone');
    feedingZone.style.display = 'flex';
    
    document.getElementById('mouth-target').className = "char-mouth-target";
    document.getElementById('feeding-status').innerHTML = "👉 <b>請把滑鼠移到下方套餐看材料，再挑選一款拖進小明嘴巴裡！</b>";
    document.getElementById('feeding-equation-display').innerText = "等候開飯中...";
    
    const holder = document.getElementById('draggable-food-holder');
    holder.innerHTML = "";
    
    stage.options.forEach((item, idx) => {
        const itemHtml = document.createElement('div');
        itemHtml.className = "drag-food-item";
        itemHtml.id = `lunch-opt-${idx}`;
        itemHtml.draggable = true;
        itemHtml.innerHTML = `
            <span style="font-size:32px;">${item.emoji}</span>
            <span>${item.name}</span>
        `;
        
        itemHtml.onmouseover = (e) => showTooltip(item, e);
        itemHtml.onmousemove = (e) => moveTooltip(e);
        itemHtml.onmouseout = () => hideTooltip();
        
        itemHtml.ondragstart = (e) => {
            e.dataTransfer.setData("text/plain", idx);
            hideTooltip();
        };
        
        holder.appendChild(itemHtml);
    });
    updateCaloriesDisplay();
}

function showTooltip(item, e) {
    tooltipDom.innerHTML = `
        <div class="tooltip-title">🥗 ${item.name}</div>
        <div style="color: #cbd5e1; font-size:12px; margin-bottom:5px;">包含以下細項：</div>
        <div>${item.setDetails}</div>
    `;
    tooltipDom.className = "lunch-tooltip visible";
    moveTooltip(e);
}

function moveTooltip(e) {
    tooltipDom.style.left = (e.pageX + 15) + 'px';
    tooltipDom.style.top = (e.pageY - 15) + 'px';
}

function hideTooltip() {
    tooltipDom.className = "lunch-tooltip";
}

function chooseTeatime(wantsToEat) {
    if (wantsToEat) {
        renderOptionsGrid();
    } else {
        caloriesHistory["teatime"] = 0;
        alert("小明決定克制自己，不吃下午茶！直接前往晚餐階段 🌌");
        currentStageIndex = 4; 
        loadStage();
    }
}

function selectItem(idx) {
    const stage = stages[currentStageIndex];
    let opt = stage.options[idx];
    
    const card = document.getElementById(`item-${idx}`);
    
    if (stage.name === "activity") {
        stage.options.forEach((_, i) => document.getElementById(`item-${i}`).classList.remove('selected'));
        
        currentSelected = [{
            name: opt.name,
            emoji: opt.emoji,
            baseCalories: opt.baseCalories,
            desc: opt.desc,
            isActivity: true
        }];
        card.classList.add('selected');
        
        const timeZone = document.getElementById('dynamic-time-select-zone');
        if(timeZone) {
            timeZone.style.display = "block";
            document.getElementById('activity-duration-select').value = "1";
            stage.selectedMultiplier = 1;
            stage.selectedDurationText = "30分鐘";
        }
        return;
    }

    const foundIdx = currentSelected.findIndex(item => item.name === opt.name);
    if (foundIdx > -1) {
        currentSelected.splice(foundIdx, 1);
        card.classList.remove('selected');
    } else {
        let requiredCount = stage.name === 'breakfast' || stage.name === 'dinner' ? 3 : 1;
        if (requiredCount === 3) {
            if (currentSelected.length >= 3) {
                alert("選剛好 3 種就可以囉！");
                return;
            }
        } else {
            stage.options.forEach((_, i) => document.getElementById(`item-${i}`).classList.remove('selected'));
            currentSelected = [];
        }
        currentSelected.push(opt);
        card.classList.add('selected');
    }
}

function lockSelection() {
    const stage = stages[currentStageIndex];
    let requiredCount = stage.name === 'breakfast' || stage.name === 'dinner' ? 3 : 1;
    
    if (currentSelected.length !== requiredCount) {
        alert(`請務必選擇剛好 ${requiredCount} 個項目！`);
        return;
    }
    
    if (stage.type === "food" && requiredCount === 3) {
        startDragFeedingMode();
    } else {
        showMathZoneDirectly();
    }
}

function startDragFeedingMode() {
    fedItemsCount = 0;
    feedingEquationText = "";
    
    document.getElementById('game-play-zone').innerHTML = ""; 
    const feedingZone = document.getElementById('feeding-zone');
    feedingZone.style.display = 'flex';
    
    document.getElementById('mouth-target').className = "char-mouth-target";
    document.getElementById('feeding-status').innerHTML = "👉 <b>請用滑鼠按住下方食物，拖拽到小明的嘴巴裡釋放！</b>";
    document.getElementById('feeding-equation-display').innerText = "算式準備中...";
    
    const holder = document.getElementById('draggable-food-holder');
    holder.innerHTML = "";
    
    currentSelected.forEach((item, idx) => {
        holder.innerHTML += `
            <div class="drag-food-item" id="drag-food-${idx}" draggable="true" ondragstart="dragStart(event, ${idx})">
                <span style="font-size:24px;">${item.emoji}</span> ${item.name}
                <span class="food-cal">${item.calories} kcal</span>
            </div>`;
    });
    
    feedingZone.scrollIntoView({ behavior: 'smooth' });
}

function dragStart(ev, index) {
    ev.dataTransfer.setData("text/plain", index);
}

function allowDrop(ev) {
    ev.preventDefault();
}

function dragEnter(ev) {
    ev.preventDefault();
    document.getElementById('mouth-target').classList.add('drag-over');
}

function dragLeave(ev) {
    document.getElementById('mouth-target').classList.remove('drag-over');
}

function dropFood(ev) {
    ev.preventDefault();
    const mouth = document.getElementById('mouth-target');
    mouth.classList.remove('drag-over');
    
    const index = ev.dataTransfer.getData("text/plain");
    if (index === "") return;
    
    const stage = stages[currentStageIndex];
    
    if (stage.type === "lunch-special") {
        const item = stage.options[index];
        const foodDom = document.getElementById(`lunch-opt-${index}`);
        if (foodDom.classList.contains('fed')) return;
        
        stage.options.forEach((_, i) => {
            document.getElementById(`lunch-opt-${i}`).classList.add('fed');
        });
        
        currentSelected = [item]; 
        document.getElementById('feeding-equation-display').innerText = item.mathFormula.replace(" = ", "");
        document.getElementById('feeding-status').innerHTML = `🎉 小明把整個「${item.name}」一口吃掉囉！`;
        mouth.classList.add('eating');
        
        setTimeout(() => {
            mouth.classList.remove('eating');
            showLunchMathZone(item);
        }, 500);
        return;
    }
    
    const foodDom = document.getElementById('drag-food-' + index);
    if (foodDom.classList.contains('fed')) return; 
    
    foodDom.classList.add('fed');
    foodDom.setAttribute('draggable', 'false');
    
    const item = currentSelected[index];
    fedItemsCount++;
    
    if (feedingEquationText === "") {
        feedingEquationText = `${item.calories}`;
    } else {
        feedingEquationText += ` + ${item.calories}`;
    }
    
    document.getElementById('feeding-equation-display').innerText = feedingEquationText;
    document.getElementById('feeding-status').innerText = `小明咬到了 ${item.name}！ (${fedItemsCount}/3)`;
    mouth.classList.add('eating');
    
    setTimeout(() => {
        mouth.classList.remove('eating');
        if (fedItemsCount === 3) {
            document.getElementById('feeding-status').innerHTML = "✨ <b>全吃光啦！請到下方填寫計算答案！</b>";
            showMathZoneAfterFeeding();
        }
    }, 500);
}

function showLunchMathZone(lunchItem) {
    const stage = stages[currentStageIndex];
    document.getElementById('math-title').innerText = "請計算午餐套餐材料的卡路里總和：";
    const linesHolder = document.getElementById('math-lines-holder');
    
    linesHolder.innerHTML = `
        <div class="sub-math-row">
            <div class="equation">${lunchItem.mathFormula}</div>
            <input type="number" id="ans-primary" placeholder="套餐總熱量">
        </div>
    `;
    document.getElementById('math-zone').style.display = 'block';
    document.getElementById('math-zone').scrollIntoView({ behavior: 'smooth' });
}

function showMathZoneAfterFeeding() {
    const stage = stages[currentStageIndex];
    document.getElementById('math-title').innerText = stage.mathTitle;
    const linesHolder = document.getElementById('math-lines-holder');
    linesHolder.innerHTML = `
        <div class="sub-math-row">
            <div class="equation">${feedingEquationText} = </div>
            <input type="number" id="ans-primary" placeholder="答案">
        </div>
    `;
    document.getElementById('math-zone').style.display = 'block';
    document.getElementById('math-zone').scrollIntoView({ behavior: 'smooth' });
}

function showMathZoneDirectly() {
    const stage = stages[currentStageIndex];
    document.getElementById('math-title').innerText = stage.mathTitle;
    const linesHolder = document.getElementById('math-lines-holder');
    linesHolder.innerHTML = '';
    
    if (stage.name === "activity") {
        const item = currentSelected[0];
        let displayFormula = "";
        
        displayFormula = `${runningCalories} - (${item.baseCalories} × ${stage.selectedMultiplier}) = `;

        linesHolder.innerHTML = `
            <div class="sub-math-row">
                <div class="equation">${displayFormula}</div>
                <input type="number" id="ans-primary" placeholder="累積熱量">
            </div>
        `;
    } 
    else if (stage.name === "teatime") {
        linesHolder.innerHTML = `
            <div class="sub-math-row">
                <div class="equation">${runningCalories} + ${currentSelected[0].calories} = </div>
                <input type="number" id="ans-primary" placeholder="答案">
            </div>
        `;
    }
    
    document.getElementById('math-zone').style.display = 'block';
    document.getElementById('math-zone').scrollIntoView({ behavior: 'smooth' });
}

function checkStageAnswer() {
    const stage = stages[currentStageIndex];
    const feedbackBox = document.getElementById('feedback-box');
    const linesHolder = document.getElementById('math-lines-holder');
    feedbackBox.style.display = 'block';
    
    let currentSum = 0;
    if (stage.name === "activity") {
        currentSum = currentSelected[0].baseCalories * stage.selectedMultiplier;
    } else {
        currentSum = currentSelected.reduce((s, item) => s + (item.calories || 0), 0);
    }
    
    if (stage.type === "lunch-special") {
        if (stepControl === 1) {
            let mainUserAns = parseInt(document.getElementById('ans-primary').value);
            if (mainUserAns !== currentSum) {
                feedbackBox.className = "feedback error";
                feedbackBox.innerHTML = `❌ <b>套餐材料總和算錯囉！</b><br>提示：請仔細加總算式左側的三個材料熱量。`;
                return;
            }
            
            caloriesHistory[stage.name] = currentSum;
            document.getElementById('ans-primary').disabled = true;
            stepControl = 2;
            
            feedbackBox.className = "feedback success";
            feedbackBox.innerHTML = `🎉 <b>第一步材料加總正確！</b> 請完成第二步：加上午餐後的累積熱量：`;
            
            const nextLine = document.createElement('div');
            nextLine.className = "sub-math-row";
            nextLine.style.marginTop = "15px";
            nextLine.style.borderTop = "1px dashed #9333ea";
            nextLine.style.paddingTop = "15px";
            
            nextLine.innerHTML = `
                <div class="equation">${runningCalories} + ${caloriesHistory[stage.name]} = </div>
                <input type="number" id="ans-mid-sum" placeholder="累積熱量">
            `;
            linesHolder.appendChild(nextLine);
            nextLine.scrollIntoView({ behavior: 'smooth' });
            return;
        } 
        else if (stepControl === 2) {
            let userMidSum = parseInt(document.getElementById('ans-mid-sum').value);
            let correctMidSum = runningCalories + caloriesHistory[stage.name];
            
            if (userMidSum !== correctMidSum) {
                feedbackBox.className = "feedback error";
                feedbackBox.innerHTML = `❌ <b>加上午餐後的累積熱量計算錯囉！</b><br>提示：請重新計算先前體內累積熱量 ${runningCalories} 加上這頓午餐 ${caloriesHistory[stage.name]} 的數值。`;
                return;
            }
            
            runningCalories = correctMidSum;
            feedbackBox.className = "feedback success";
            feedbackBox.innerHTML = `🎉 <b>太棒了！兩步驟都計算正確！小明順利吸收了美味午餐！</b>`;
            updateCaloriesDisplay();
            
            currentSelected.forEach(item => chosenFoodsHistory.push(item));
            document.getElementById('verify-btn').style.display = 'none';
            document.getElementById('next-stage-btn').style.display = 'block';
            feedbackBox.scrollIntoView({ behavior: 'smooth' });
            return;
        }
    }

    if (stage.name === "dinner") {
        if (stepControl === 1) {
            let mainUserAns = parseInt(document.getElementById('ans-primary').value);
            if (mainUserAns !== currentSum) {
                feedbackBox.className = "feedback error";
                feedbackBox.innerHTML = `❌ <b>晚餐總和算錯囉！</b><br>提示：請重新檢查拖進嘴裡的這三個食物卡路里總和。`;
                return;
            }
            
            caloriesHistory[stage.name] = currentSum;
            document.getElementById('ans-primary').disabled = true;
            stepControl = 2;
            
            feedbackBox.className = "feedback success";
            feedbackBox.innerHTML = `🎉 <b>晚餐加總正確！</b> 請繼續計算下一步：把剛吃下去的熱量加上目前體內累積熱量：`;
            
            const nextLine = document.createElement('div');
            nextLine.className = "sub-math-row";
            nextLine.style.marginTop = "15px";
            nextLine.style.borderTop = "1px dashed #9333ea";
            nextLine.style.paddingTop = "15px";
            
            nextLine.innerHTML = `
                <div class="equation">${runningCalories} + ${caloriesHistory[stage.name]} = </div>
                <input type="number" id="ans-mid-sum" placeholder="總和">
            `;
            linesHolder.appendChild(nextLine);
            nextLine.scrollIntoView({ behavior: 'smooth' });
            return;
        } 
        else if (stepControl === 2) {
            let userMidSum = parseInt(document.getElementById('ans-mid-sum').value);
            let correctMidSum = runningCalories + caloriesHistory[stage.name];
            
            if (userMidSum !== correctMidSum) {
                feedbackBox.className = "feedback error";
                feedbackBox.innerHTML = `❌ <b>算錯囉！</b><br>提示：請重新計算 ${runningCalories} + ${caloriesHistory[stage.name]} 的合併總熱量。`;
                return;
            }
            
            runningCalories = correctMidSum;
            feedbackBox.className = "feedback success";
            feedbackBox.innerHTML = `🎉 <b>太棒了！晚餐累積計算完全正確！</b>`;
            updateCaloriesDisplay();
            
            currentSelected.forEach(item => chosenFoodsHistory.push(item));
            document.getElementById('verify-btn').style.display = 'none';
            document.getElementById('next-stage-btn').style.display = 'block';
            feedbackBox.scrollIntoView({ behavior: 'smooth' });
            return;
        }
    }

    let mainUserAns = parseInt(document.getElementById('ans-primary').value);
    let correctAns = 0;
    
    if (stage.name === "breakfast") correctAns = currentSum;
    else if (stage.name === "activity") correctAns = runningCalories - currentSum;
    else if (stage.name === "teatime") correctAns = runningCalories + currentSum;
    
    if (mainUserAns !== correctAns) {
        feedbackBox.className = "feedback error";
        if (stage.name === "activity") {
            feedbackBox.innerHTML = `❌ <b>活動後的累積熱量算錯囉！</b><br>提示：請手動將（30分鐘 ${currentSelected[0].baseCalories} × 時間倍數 ${stage.selectedMultiplier}）算出來，再用原本的體內熱量 ${runningCalories} 去扣除喔。`;
        } else {
            feedbackBox.innerHTML = `❌ <b>計算結果不正確喔！</b><br>提示：請再細心算一下！`;
        }
        return;
    }
    
    if (stage.name === "activity") {
        caloriesHistory[stage.name] = currentSum; 
    } else {
        caloriesHistory[stage.name] = currentSum;
    }
    
    runningCalories = correctAns;
    
    feedbackBox.className = "feedback success";
    feedbackBox.innerHTML = `🎉 <b>太棒了！數值與計算完全正確！</b>`;
    updateCaloriesDisplay();

    if (stage.name === "activity") {
        chosenFoodsHistory.push({
            name: `${currentSelected[0].name} (${stage.selectedDurationText})`,
            emoji: currentSelected[0].emoji,
            desc: currentSelected[0].desc,
            isActivity: true,
            calories: currentSum
        });
    } else {
        currentSelected.forEach(item => chosenFoodsHistory.push(item));
    }
    
    document.getElementById('verify-btn').style.display = 'none';
    document.getElementById('next-stage-btn').style.display = 'block';
    feedbackBox.scrollIntoView({ behavior: 'smooth' });
}

function goToNextStage() {
    if (stages[currentStageIndex].name === "teatime") {
        currentStageIndex = 4; 
    } else {
        currentStageIndex++;
    }

    if (currentStageIndex < stages.length) {
        loadStage();
    } else {
        showFinalSummary();
    }
}

function showFinalSummary() {
    for(let i=0; i<=5; i++) {
        document.getElementById(`node-${i}`).classList.remove('active');
    }
    document.getElementById('node-5').classList.add('active');
    
    document.getElementById('story-display').innerHTML = `🏆 <b>全日大功告成！</b><br>快來看看小明今天的熱量總整理，還有你為他挑選的每一個食物背後的小祕密！點擊你今天選過的任一項目，就能解鎖詳細的營養分析與健康介紹喔！`;
    document.getElementById('game-play-zone').innerHTML = '';
    document.getElementById('feeding-zone').style.display = 'none';
    document.getElementById('math-zone').style.display = 'none';
    
    const feedbackBox = document.getElementById('feedback-box');
    feedbackBox.style.display = 'block';
    feedbackBox.className = "feedback success";
    
    let foodListHTML = `<p style="margin-top:20px; font-weight:bold; color:#1e293b;">🔍 <b>互動小實驗：</b>點擊下方你今天選過的任何一種項目，就能解鎖查看更多秘密喔！</p>`;
    foodListHTML += `<div class="summary-food-list">`;
    
    // 按鈕本身移除了括號內多餘的卡路里顯示，保持原本精簡外觀
    chosenFoodsHistory.forEach((food, idx) => {
        foodListHTML += `
            <div class="summary-food-item" onclick="showNutrientDetails(${idx})">
                <span>${food.emoji}</span>
                <span>${food.name}</span>
            </div>`;
    });
    foodListHTML += `</div>`;
    foodListHTML += `<div id="nutrient-detail-box" class="nutrient-display-box"></div>`;

    feedbackBox.innerHTML = `
        <h2>📊 小明的一日數據總結報告</h2>
        <p>🌅 早餐吸收：<b>+ ${caloriesHistory.breakfast} kcal</b></p>
        <p>🌆 午餐吸收：<b>+ ${caloriesHistory.lunch} kcal</b></p>
        <p>🏃‍♂️ 活動消耗：<b>- ${caloriesHistory.activity} kcal</b></p>
        <p>☕ 下午茶吸收：<b>+ ${caloriesHistory.teatime} kcal</b></p>
        <p>🌌 晚餐吸收：<b>+ ${caloriesHistory.dinner} kcal</b></p>
        <hr style="border:1px dashed #22c55e; margin: 15px 0;">
        <p style="font-size:22px; color:#1e3a8a; font-weight:bold;">🏆 今天小明累積淨熱量：${runningCalories} kcal</p>
        ${foodListHTML}
        <button class="action-btn" onclick="restartGame()" style="background-color: #ef4444; margin-top:20px;">🔄 重新開始新的一天</button>
    `;
    
    document.getElementById('next-stage-btn').style.display = 'none';
    feedbackBox.scrollIntoView({ behavior: 'smooth' });
}

function showNutrientDetails(idx) {
    const food = chosenFoodsHistory[idx];
    const detailBox = document.getElementById('nutrient-detail-box');
    detailBox.style.display = "block";
    
    let tagsHtml = "";
    let displayWeight = "";
    
    // 點擊後的小檔案面板內，精準渲染指定格式
    if (food.isActivity) {
        displayWeight = `<br><span style="color:#e65100; font-size:13px;">🔥 消耗熱量：${food.calories} kcal</span>`;
        tagsHtml = `<span class="nutrient-tag" style="background:#fef3c7; color:#d97706; border-color:#fde68a;">🏃 課後活動</span>`;
    } else {
        displayWeight = `<br><span style="color:#0284c7; font-size:13px;">⚖️ 份量：${food.weight || '1份'} | 🎯 熱量：${food.calories} kcal</span>`;
        if (food.nutrients && food.nutrients.length > 0) {
            food.nutrients.forEach(nut => {
                tagsHtml += `<span class="nutrient-tag">✨ ${nut}</span>`;
            });
        }
    }

    detailBox.innerHTML = `
        <div class="nutrient-title">🔍 ${food.emoji} ${food.name} 的健康小檔案：${displayWeight}</div>
        <div>${tagsHtml}</div>
        <div class="nutrient-desc">${food.desc || '這個項目能為生活提供活力與滿滿能量喔！'}</div>
    `;
}

function restartGame() {
    location.reload();
}
</script>

</body>
</html>
