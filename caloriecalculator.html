            { calories: 135, name: '盒裝檸檬茶', weight: '1盒', emoji: '🧃', nutrients: ['碳水化合物', '水分'] },
            { calories: 160, name: '巧克力餅乾', weight: '3片', emoji: '🍪', nutrients: ['脂肪', '碳水化合物'] }
        ]
    },
    {
        name: "dinner",
        type: "food",
        story: "🌌 <b>第五站：晚上屋企晚餐 20:00</b><br>快樂的一天快將結束，幫小明挑選最後的<b>剛好3種</b>晚餐食物！",
        mathTitle: "請計算一天的總熱量：把午餐後累積熱量加上晚餐3種食物卡路里：",
        options: [
            { calories: 210, name: '熱湯通粉', weight: '1碗', emoji: '🍜', nutrients: ['碳水化合物', '水分'] },
            { calories: 157, name: '鮮蝦炒豆角', weight: '1碟', emoji: '🫛', nutrients: ['蛋白質', '碳水化合物'] },
            { calories: 45, name: '白菜豆腐湯', weight: '1碗', emoji: '🥣', nutrients: ['蛋白質', '礦物質'] },
            { calories: 166, name: '新鮮菠蘿片', weight: '1包 (約4塊)', emoji: '🍍', nutrients: ['維生素', '水分'] },
            { calories: 400, name: '珍珠奶茶', weight: '1杯', emoji: '🧋', nutrients: ['碳水化合物', '脂肪'] },
            { calories: 550, name: '牛腩燜蘿蔔', weight: '1碟', emoji: '🍛', nutrients: ['脂肪', '蛋白質'] },
            { calories: 38, name: '鮮甜紅士多啤梨', weight: '1碗 (約7粒)', emoji: '🍓', nutrients: ['維生素', '水分'] },
            { calories: 225, name: '煎蜜汁午餐肉', weight: '2厚片', emoji: '🥩', nutrients: ['脂肪', '蛋白質'] },
            { calories: 172, name: '蒸番薯', weight: '1條', emoji: '🍠', nutrients: ['碳水化合物', '膳食纖維'] },
            { calories: 320, name: '蒸豬肉白菜水餃', weight: '1盤 (8隻)', emoji: '🥟', nutrients: ['碳水化合物', '蛋白質', '脂肪'] },
            { calories: 140, name: '番茄炒雞蛋', weight: '1碟', emoji: '🍳', nutrients: ['蛋白質', '維生素'] },
            { calories: 190, name: '蜜汁烤雞翼', weight: '2隻', emoji: '🍗', nutrients: ['蛋白質', '脂肪'] }
        ]
    }
];

let currentStageIndex = 0;
let currentSelected = [];
let fedItemsCount = 0; 
let chosenFoodsHistory = [];
let runningCalories = 0; 

window.onload = function() {
    loadStage();
};

function updateCaloriesDisplay() {
    document.getElementById('current-calories-display').innerText = `📈 目前體內累積熱量：${runningCalories} kcal`;
}

function loadStage() {
    currentSelected = [];
    document.getElementById('math-zone').style.display = 'none';
    document.getElementById('feeding-zone').style.display = 'none';
    document.getElementById('feedback-box').style.display = 'none';
    document.getElementById('next-stage-btn').style.display = 'none';
    document.getElementById('verify-btn').style.display = 'block';
    
    for(let i=0; i<=5; i++) {
        const node = document.getElementById(`node-${i}`);
        if(i === currentStageIndex) node.classList.add('active');
        else node.classList.remove('active');
    }

    const stage = stages[currentStageIndex];
    document.getElementById('story-display').innerHTML = stage.story;
    
    if (stage.name === "teatime") {
        let teatimeChoiceHtml = `
            <div class="teatime-choice-box">
                <button class="choice-btn yes" onclick="chooseTeatime(true)">🙋‍♂️ 要吃，挑個零食點心</button>
                <button class="choice-btn no" onclick="chooseTeatime(false)">🙅‍♂️ 不吃，直接跳過下午茶</button>
            </div>
            <div id="teatime-options-area" style="display:none;"></div>
        `;
        document.getElementById('game-play-zone').innerHTML = teatimeChoiceHtml;
        return;
    }

    if (stage.type === "lunch-special") {
        startLunchSpecialMode();
    } else {
        renderOptionsGrid();
    }
}

function renderOptionsGrid() {
    const stage = stages[currentStageIndex];
    let requiredCount = stage.name === 'breakfast' || stage.name === 'dinner' ? 3 : 1;
    let html = `<div class="section-title">${stage.type === 'food' ? `🍽️ 請選擇 ${requiredCount} 種食物：` : '🏃‍♂️ 請選擇 1 個項目：'}</div><div class="grid">`;
    
    stage.options.forEach((opt, idx) => {
        html += `
            <div class="card" id="item-${idx}" onclick="selectItem(${idx})">
                <div>
                    <div class="emoji">${opt.emoji}</div>
                    <div class="name">${opt.name}</div>
                    <div class="weight">份量: ${opt.weight}</div>
                </div>
                <div>
                    <div class="info">${stage.type === 'food' ? opt.calories + ' kcal' : '消耗 ' + opt.calories + ' kcal'}</div>
                </div>
            </div>`;
    });
    html += `</div><button class="action-btn" onclick="lockSelection()">選好了，確認！ ➔</button>`;
    
    let targetArea = document.getElementById('teatime-options-area');
    if (stage.name === "teatime" && targetArea) {
        targetArea.innerHTML = html;
        targetArea.style.display = 'block';
    } else {
        document.getElementById('game-play-zone').innerHTML = html;
    }
    updateCaloriesDisplay();
}

function startLunchSpecialMode() {
    const stage = stages[currentStageIndex];
    document.getElementById('game-play-zone').innerHTML = ""; 
    const feedingZone = document.getElementById('feeding-zone');
    feedingZone.style.display = 'flex';
    
    document.getElementById('mouth-target').className = "char-mouth-target";
    document.getElementById('feeding-status').innerHTML = "👉 <b>請把滑鼠移到下方套餐上看內容，再挑選一款拖進小明嘴巴裡！</b>";
    
    const holder = document.getElementById('draggable-food-holder');
    holder.innerHTML = "";
    
    stage.options.forEach((item, idx) => {
        const itemHtml = document.createElement('div');
        itemHtml.className = "drag-food-item";
        itemHtml.draggable = true;
        // 已修改：午餐卡片不再顯示 total kcal
        itemHtml.innerHTML = `
            <span style="font-size:32px;">${item.emoji}</span>
            <span>${item.name}</span>
        `;
        
        const tooltipDom = document.getElementById('lunch-tooltip');
        itemHtml.onmouseover = (e) => {
            // 已修改：移除「材料拆解：」字眼
            let detailsHtml = `<div class="tooltip-title">${item.emoji} ${item.name}</div>`;
            item.setDetails.forEach(d => {
                detailsHtml += `<div class="tooltip-item"><span class="item-line">${d.name}</span><span class="item-cal">${d.cal} kcal</span></div>`;
            });
            tooltipDom.innerHTML = detailsHtml;
            tooltipDom.className = "lunch-tooltip visible";
            moveTooltip(e);
        };
        itemHtml.onmousemove = (e) => moveTooltip(e);
        itemHtml.onmouseout = () => { tooltipDom.className = "lunch-tooltip"; };
        
        itemHtml.ondragstart = (e) => {
            e.dataTransfer.setData("text/plain", idx);
            tooltipDom.className = "lunch-tooltip";
        };
        
        holder.appendChild(itemHtml);
    });
    
    function moveTooltip(e) {
        tooltipDom.style.left = (e.pageX + 15) + 'px';
        tooltipDom.style.top = (e.pageY - 15) + 'px';
    }

    updateCaloriesDisplay();
}

function allowDrop(ev) {
    ev.preventDefault();
}

function dragEnter(ev) {
    ev.preventDefault();
    document.getElementById('mouth-target').classList.add('drag-over');
}

function dragLeave(ev) {
    document.getElementById('mouth-target').classList.remove('drag-over');
}

function dropFood(ev) {
    ev.preventDefault();
    const mouth = document.getElementById('mouth-target');
    mouth.classList.remove('drag-over');
    
    const index = ev.dataTransfer.getData("text/plain");
    if (index === "") return;
    
    const stage = stages[currentStageIndex];
    
    if (stage.type === "lunch-special") {
        const selectedLunch = stage.options[index];
        currentSelected = [selectedLunch];
        
        stage.options.forEach((_, i) => {
            const foodDom = document.getElementById('feeding-zone').querySelectorAll('.drag-food-item')[i];
            if (parseInt(i) === parseInt(index)) {
                foodDom.classList.add('fed');
            } else {
                foodDom.style.opacity = '0.3';
                foodDom.style.pointerEvents = 'none';
            }
        });
        
        document.getElementById('feeding-status').innerText = `😋 哇！美味的 ${selectedLunch.name}！`;
        mouth.classList.add('eating');
        
        setTimeout(() => {
            mouth.classList.remove('eating');
            document.getElementById('feeding-status').innerHTML = "✨ <b>吃光啦！快來把累積卡路里算出來！</b>";
            showMathZoneDirectly();
        }, 600);
    } else {
        const foodDom = document.getElementById(`drag-food-${index}`);
        if (foodDom.classList.contains('fed')) return; 
        
        foodDom.classList.add('fed');
        foodDom.setAttribute('draggable', 'false');
        
        const item = currentSelected[index];
        fedItemsCount++;
        
        document.getElementById('feeding-status').innerText = `小明咬到了 ${item.name}！ (${fedItemsCount}/3) 二話不說吞了下去！`;
        mouth.classList.add('eating');
        
        setTimeout(() => {
            mouth.classList.remove('eating');
            if (fedItemsCount === 3) {
                document.getElementById('feeding-status').innerHTML = "✨ <b>全吃光啦！請到下方填寫累積熱量答案！</b>";
                showMathZoneDirectly();
            }
        }, 500);
    }
}

function chooseTeatime(wantsToEat) {
    if (wantsToEat) {
        renderOptionsGrid();
    } else {
        alert("小明決定克制自己，不吃下午茶！直接前往晚餐階段 🌌");
        currentStageIndex = 4; 
        loadStage();
    }
}

function selectItem(idx) {
    const stage = stages[currentStageIndex];
    const opt = stage.options[idx];
    const card = document.getElementById(`item-${idx}`);
    
    const foundIdx = currentSelected.findIndex(item => item.name === opt.name);
    if (foundIdx > -1) {
        currentSelected.splice(foundIdx, 1);
        card.classList.remove('selected');
    } else {
        let requiredCount = stage.name === 'breakfast' || stage.name === 'dinner' ? 3 : 1;
        if (requiredCount === 3) {
            if (currentSelected.length >= 3) {
                alert("選剛好 3 種就可以囉！");
                return;
            }
        } else {
            stage.options.forEach((_, i) => document.getElementById(`item-${i}`).classList.remove('selected'));
            currentSelected = [];
        }
        currentSelected.push(opt);
        card.classList.add('selected');
    }
}

function lockSelection() {
    const stage = stages[currentStageIndex];
    let requiredCount = stage.name === 'breakfast' || stage.name === 'dinner' ? 3 : 1;
    
    if (currentSelected.length !== requiredCount) {
        alert(`請務必選擇剛好 ${requiredCount} 個項目！`);
        return;
    }
    
    if (stage.type === "food" && requiredCount === 3) {
        startClickBasedfeedingZone();
    } else {
        showMathZoneDirectly();
    }
}

function startClickBasedfeedingZone() {
    fedItemsCount = 0;
    document.getElementById('game-play-zone').innerHTML = ""; 
    const feedingZone = document.getElementById('feeding-zone');
    feedingZone.style.display = 'flex';
    
    document.getElementById('mouth-target').className = "char-mouth-target";
    document.getElementById('feeding-status').innerHTML = "👉 <b>請用滑鼠按住下方食物，拖拽到小明的嘴巴裡釋放！</b>";
    
    const holder = document.getElementById('draggable-food-holder');
    holder.innerHTML = "";
    
    currentSelected.forEach((item, idx) => {
        const foodHtml = document.createElement('div');
        foodHtml.className = 'drag-food-item';
        foodHtml.id = `drag-food-${idx}`;
        foodHtml.draggable = true;
        foodHtml.innerHTML = `
            <span style="font-size:32px;">${item.emoji}</span>
            <span>${item.name}</span>
            <span class="food-cal">${item.calories} kcal</span>
        `;
        foodHtml.ondragstart = (e) => { e.dataTransfer.setData("text/plain", idx); };
        holder.appendChild(foodHtml);
    });
    
    feedingZone.scrollIntoView({ behavior: 'smooth' });
}

function showMathZoneDirectly() {
    const stage = stages[currentStageIndex];
    document.getElementById('math-title').innerText = stage.mathTitle;
    const linesHolder = document.getElementById('math-lines-holder');
    linesHolder.innerHTML = '';
    
    let equationStr = "";
    
    if (stage.name === 'breakfast') {
        equationStr = currentSelected.map(item => item.calories).join(' + ') + ' = ';
    } 
    else if (stage.name === 'lunch') {
        const selectedLunch = currentSelected[0];
        const subCals = selectedLunch.setDetails.map(d => d.cal).join(' + ');
        equationStr = `${runningCalories} + (${subCals}) = `;
    }
    else if (stage.name === "activity") {
        equationStr = `${runningCalories} - ${currentSelected[0].calories} = `;
    } 
    else if (stage.name === "teatime") {
        equationStr = `${runningCalories} + ${currentSelected[0].calories} = `;
    }
    else if (stage.name === 'dinner') {
        equationStr = `${runningCalories} + (${currentSelected.map(item => item.calories).join(' + ')}) = `;
    }
    
    linesHolder.innerHTML = `
        <div class="sub-math-row">
            <div class="equation">${equationStr}</div>
            <input type="number" id="ans-primary" placeholder="答案">
        </div>
    `;
    
    document.getElementById('math-zone').style.display = 'block';
    document.getElementById('math-zone').scrollIntoView({ behavior: 'smooth' });
}

function checkStageAnswer() {
    const feedbackBox = document.getElementById('feedback-box');
    const userAns = parseInt(document.getElementById('ans-primary').value);
    feedbackBox.style.display = 'block';

    const stage = stages[currentStageIndex];
    let correctAns;

    if (stage.name === 'breakfast') {
        correctAns = currentSelected.reduce((sum, item) => sum + item.calories, 0);
    } 
    else if (stage.name === 'lunch') {
        correctAns = runningCalories + currentSelected[0].calories;
    }
    else if (stage.name === 'activity') {
        correctAns = runningCalories - currentSelected[0].calories;
    }
    else if (stage.name === 'teatime') {
        correctAns = runningCalories + currentSelected[0].calories;
    }
    else if (stage.name === 'dinner') {
        const dinnerSum = currentSelected.reduce((sum, item) => sum + item.calories, 0);
        correctAns = runningCalories + dinnerSum;
    }

    if (userAns === correctAns) {
        feedbackBox.className = "feedback success";
        let feedbackText = `🎉 <b>太棒了！計算正確！</b><br>`;
        if (stage.name === 'breakfast' || stage.name === 'lunch' || stage.name === 'teatime') {
            feedbackText += `這頓餐點共增加了 ${userAns - runningCalories} kcal。`;
        } else if (stage.name === 'dinner') {
            feedbackText += `你今天的總卡路里是：${userAns} kcal！`;
        } else {
            feedbackText += `活動讓你消耗了 ${currentSelected[0].calories} kcal，你很努力喔！`;
        }
        feedbackBox.innerHTML = feedbackText;
        
        if (stage.type !== 'activity') {
            currentSelected.forEach(food => chosenFoodsHistory.push(food));
        }
        
        runningCalories = userAns; 
        updateCaloriesDisplay();
        document.getElementById('math-zone').style.display = 'none'; 
        
        if (currentStageIndex === 4) {
            document.getElementById('next-stage-btn').innerText = "查看全日大總結 ➔";
            document.getElementById('next-stage-btn').onclick = showFinalSummary;
        } else {
            document.getElementById('next-stage-btn').innerText = "前往下一階段 ➔";
            document.getElementById('next-stage-btn').onclick = goToNextStage;
        }
        document.getElementById('next-stage-btn').style.display = 'block';
        
    } else {
        feedbackBox.className = "feedback error";
        feedbackBox.innerHTML = `❌ <b>卡路里算錯囉！</b><br>再細心算一次吧！加油！`;
    }
}

function goToNextStage() {
    currentStageIndex++;
    loadStage();
}

function restartGame() {
    location.reload();
}

function showFinalSummary() {
    for(let i=0; i<=5; i++) {
        document.getElementById(`node-${i}`).classList.remove('active');
    }
    document.getElementById('node-5').classList.add('active');
    
    document.getElementById('story-display').innerHTML = `🏆 <b>全日大功告成！</b><br>快來看看小明今天的熱量總結與你挑選的食物秘密！`;
    document.getElementById('game-play-zone').innerHTML = '';
    document.getElementById('feeding-zone').style.display = 'none';
    document.getElementById('math-zone').style.display = 'none';
    
    const feedbackBox = document.getElementById('feedback-box');
    feedbackBox.style.display = 'block';
    feedbackBox.className = "feedback success";
    
    let foodListHTML = `<p style="margin-top:20px; font-weight:bold; color:#1e293b;">🔍 <b>互動小實驗：</b>點擊下方你今天選過的任何一種食物，就能解鎖查看它包含哪些營養素喔！</p>`;
    foodListHTML += `<div class="summary-food-list">`;
    chosenFoodsHistory.forEach((food, idx) => {
        foodListHTML += `
            <div class="summary-food-item" onclick="showNutrientDetails(${idx})">
                <span>${food.emoji}</span>
                <span>${food.name}</span>
            </div>`;
    });
    foodListHTML += `</div>`;
    foodListHTML += `<div id="nutrient-detail-box" class="nutrient-display-box"></div>`;

    feedbackBox.innerHTML = `
        <h2>📊 小明的一日數據總結報告</h2>
        <p>🌅 早餐：幫小明開個好頭！</p>
        <p>🏫 午餐：吸收了整頓豐富的能量！</p>
        <p>🏃 活動：你很努力運動喔！</p>
        <p>☕ 下午茶：這頓小吃很不錯！</p>
        <p>🌌 晚餐：吃得很豐盛的一頓！</p>
        <hr style="border: 1px dashed #cccccc;">
        <p style="font-size:22px; color:#1e3a8a; font-weight:bold; margin-bottom:5px;">🏆 今天累積淨熱量：${runningCalories} kcal</p>
        ${foodListHTML}
        <button class="action-btn" onclick="restartGame()" style="background-color: #ef4444; margin-top:25px;">🔄 重新開始新的一天</button>
    `;
    
    document.getElementById('next-stage-btn').style.display = 'none';
    feedbackBox.scrollIntoView({ behavior: 'smooth' });
}

function showNutrientDetails(index) {
    const food = chosenFoodsHistory[index];
    const box = document.getElementById('nutrient-detail-box');
    box.style.display = 'block';
    
    let tagsHTML = '';
    if(food.nutrients && food.nutrients.length > 0) {
        food.nutrients.forEach(n => {
            tagsHTML += `<span class="nutrient-tag">✨ ${n}</span>`;
        });
    } else {
        tagsHTML = '<span style="color: #64748b;">這個項目提供能量或水分消耗，無特別標籤營養素。</span>';
    }
    
    box.innerHTML = `
        <div class="nutrient-title">${food.emoji} ${food.name} 的營養標籤：</div>
        <div>${tagsHTML}</div>
    `;
}
</script>
